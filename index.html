h<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator AI Hub</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

input{
width:90%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:20px;
}

button{
margin-top:15px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:left;
}
</style>

</head>
<body>

<div class="container">

<h1>🚀 Creator AI Hub</h1>

<p>Create Better YouTube Titles</p>

<input id="topic" placeholder="Enter your topic">

<br>

<button onclick="generate()">Generate Titles</button>

<div class="result" id="output">

Your titles will appear here...

</div>

</div>

<script>

function generate(){

let topic=document.getElementById("topic").value;

if(topic==""){
alert("Enter a topic");
return;
}

document.getElementById("output").innerHTML=
`
<h3>Suggested Titles</h3>

1. ${topic} - Top 10 Secrets<br><br>

2. Amazing ${topic} Tips You Must Know<br><br>

3. ${topic} Explained in 5 Minutes<br><br>

4. Don't Watch ${topic} Before Seeing This<br><br>

5. Ultimate ${topic} Guide 2026
`;

}

</script>

</body>
</html>
