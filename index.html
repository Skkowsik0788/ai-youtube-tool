)<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator AI Hub</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

input{
width:90%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:20px;
}

button{
padding:14px 24px;
margin:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
background:#1e293b;
padding:20px;
margin-top:20px;
border-radius:12px;
text-align:left;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 Creator AI Hub</h1>

<p>Create YouTube Content Faster</p>

<input id="topic" placeholder="Enter your topic">

<br>

<button onclick="generateTitles()">🎬 Generate Titles</button>

<button onclick="generateDescription()">📝 Description</button>
<button onclick="generateHashtags()">🏷️ Hashtags</button>
<div class="result" id="output">
Results will appear here...
</div>
<button onclick="copyResult()">📋 Copy Result</button>
</div>

<script>

function getTopic(){
return document.getElementById("topic").value;
}

function generateTitles(){

let topic=getTopic();

if(topic==""){
alert("Enter a topic");
return;
}

document.getElementById("output").innerHTML=`
<h2>🎬 Suggested Titles</h2>

1. Top 10 ${topic} Secrets<br><br>

2. ${topic} Explained in 5 Minutes<br><br>

3. Amazing ${topic} Tips<br><br>

4. Ultimate ${topic} Guide 2026<br><br>

5. Don't Watch ${topic} Before This
`;

}

function generateDescription(){

let topic=getTopic();

if(topic==""){
alert("Enter a topic");
return;
}

document.getElementById("output").innerHTML=`
<h2>📝 YouTube Description</h2>

Welcome to our latest video about <b>${topic}</b>.

In this video you'll learn useful tips, hidden tricks and important information about ${topic}.

👍 Like
🔔 Subscribe
💬 Comment your opinion.

#${topic.replace(/ /g,"")}
`;
function copyResult(){

let text = document.getElementById("output").innerText;

navigator.clipboard.writeText(text);

alert("✅ Result Copied!");

  }  
}                                 
function generateHashtags(){

let topic=getTopic();

if(topic==""){
alert("Enter a topic");
return;
}

let tag = topic.replace(/ /g,"");

document.getElementById("output").innerHTML=`
<h2>🏷️ Suggested Hashtags</h2>

#${tag}<br><br>

#${tag}Tips<br><br>

#${tag}2026<br><br>

#Viral<br><br>

#Trending<br><br>

#YouTubeShorts
`;

  }
</script>

</body>
</html>
